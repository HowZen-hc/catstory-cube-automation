name: Trunk Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run pyinstaller cube_automation.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubeAutomation-trunk-${{ github.sha }}
          path: dist/CubeAutomation/
          retention-days: 7
