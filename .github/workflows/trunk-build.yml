name: Trunk Build

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run pyinstaller cube_automation.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CubeAutomation-trunk-${{ github.event.workflow_run.head_sha }}
          path: dist/CubeAutomation/
          retention-days: 7
