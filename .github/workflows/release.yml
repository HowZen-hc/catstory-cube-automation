name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # allows manual trigger from any branch

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller cube_automation.spec

      - name: Upload artifact (for manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: CubeAutomation-windows
          path: dist/CubeAutomation/

      - name: Zip output (for tag releases)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist/CubeAutomation/* -DestinationPath "dist/CubeAutomation-$($env:GITHUB_REF_NAME)-windows.zip"

      - name: Create Release (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: dist/CubeAutomation-*-windows.zip
