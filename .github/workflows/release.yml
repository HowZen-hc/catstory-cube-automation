name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Build with PyInstaller
        run: uv run pyinstaller cube_automation.spec

      - name: Zip output
        run: Compress-Archive -Path dist/CubeAutomation/* -DestinationPath dist/CubeAutomation-${{ github.ref_name }}-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CubeAutomation-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
